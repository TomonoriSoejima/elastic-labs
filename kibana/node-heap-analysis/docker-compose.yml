version: '3.8'

services:

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.17.0
    container_name: es-lab
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx1g"
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20

  kibana:
    image: docker.elastic.co/kibana/kibana:8.17.0
    container_name: kibana-lab
    depends_on:
      elasticsearch:
        condition: service_healthy
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - xpack.security.enabled=false
      - NODE_OPTIONS=--inspect=0.0.0.0:9230
    ports:
      - "5601:5601"    # Kibana UI
      - "9230:9230"    # Node.js inspector → chrome://inspect
    volumes:
      - snapshots:/snapshots
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 30

  snapshot-helper:
    build: ./snapshot-helper
    container_name: snapshot-helper
    depends_on:
      - kibana
    environment:
      - INSPECTOR_HOST=kibana
      - INSPECTOR_PORT=9230
      - SNAPSHOTS_DIR=/snapshots
    volumes:
      - snapshots:/snapshots
    command: ["node", "server.js"]
    ports:
      - "3001:3001"

volumes:
  snapshots:
