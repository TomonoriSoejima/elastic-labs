input {
  tcp {
    port => 5555
    codec => cef {
      # Match customer config: split on \n, leaving bare \r as a standalone event
      delimiter => "\n"
    }
  }
}

filter {
  # Simulate slow downstream (blocked output / backpressure).
  # Every event — including CEF failure events — is held here.
  # Increase 'time' to fill the PQ faster.
  sleep {
    time => 3
    every => 1
  }
}

output {
  null {}
}
